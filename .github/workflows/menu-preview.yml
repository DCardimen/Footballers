name: Main menu visual check

on:
  pull_request:
    paths:
      - 'index.html'
      - 'public/rib-menu*.css'
      - 'public/rib-menu*.js'
      - 'menu-preview.html'
      - 'scripts/menu-preview-shot.mjs'
      - 'scripts/menu-integration-check.mjs'
      - 'scripts/assemble-pages.mjs'
      - 'scripts/bake-menu-into-index.mjs'
      - 'a_clean_high_resolution_game_ui_asset_sheet_on_a_1_batch_1.png'
      - 'a_clean_ui_graphic_assets_sprite_sheet_mockup_im_2_batch_2.png'
      - 'a_clean_graphic_artwork_ui_icon_sheet_on_a_trans_3_batch_3.png'
      - '.github/workflows/menu-preview.yml'
      - '.github/workflows/pages.yml'
      - '.github/workflows/bake-main-menu-index.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Assemble and verify exact Pages output
        env:
          RIB_BUILD_VERSION: pr-${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          node scripts/assemble-pages.mjs _site
          test -f _site/.nojekyll
          test -f _site/rib-build.json
          grep -q 'RIB_DIRECT_MENU_HEAD_BEGIN' _site/index.html
          grep -q './public/rib-menu-assets.css?v=' _site/index.html
          grep -q './public/rib-menu-navigation.js?v=' _site/index.html
          test -f _site/public/rib-menu-assets.css
          test -f _site/public/rib-menu-navigation.js

      - run: npx playwright install --with-deps chromium

      - name: Start Vite preview server
        run: |
          npm run dev -- --host 127.0.0.1 > /tmp/rib-vite.log 2>&1 &
          for i in {1..40}; do
            curl -fsS http://127.0.0.1:5173/menu-preview.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/rib-vite.log
          exit 1

      - run: node scripts/menu-preview-shot.mjs

      - name: Start exact Pages-output server
        run: |
          pkill -f 'vite' || true
          python3 -m http.server 5173 --directory _site > /tmp/rib-pages.log 2>&1 &
          for i in {1..40}; do
            curl -fsS http://127.0.0.1:5173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/rib-pages.log
          exit 1

      - name: Verify direct menu and repeated return behavior
        env:
          MENU_INTEGRATION_URL: http://127.0.0.1:5173/index.html
        run: node scripts/menu-integration-check.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: main-menu-preview
          path: |
            menu-preview.png
            menu-preview-metrics.json
            menu-integration-diagnostics.json
            menu-integration-failure.png
            _site/rib-build.json
          if-no-files-found: warn
