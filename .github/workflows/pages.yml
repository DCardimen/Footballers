name: Deploy playable build to GitHub Pages

# Publishes the self-contained index.html to GitHub Pages on every push, so the
# "play / read the current build" link always serves the newest committed game.
on:
  push:
    branches:
      - main
      - claude/football-field-depth-9fcesb
      - agent/main-menu-reference-v1
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push cancel an in-flight deploy rather than queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (self-contained game + fallback assets)
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          if [ -d public ]; then cp -r public/. _site/; fi
          if [ -f menu-preview.html ]; then cp menu-preview.html _site/menu-preview.html; fi
          python - <<'PY'
          from pathlib import Path
          path = Path('_site/index.html')
          html = path.read_text(encoding='utf-8')
          css = '<link rel="stylesheet" href="./rib-menu-reset.css"><link rel="stylesheet" href="./rib-menu.css"><link rel="stylesheet" href="./rib-menu-mobile.css">'
          js = '<script src="./rib-menu.js"></script>'
          if 'rib-menu.css' not in html:
              html = html.replace('</head>', css + '</head>', 1)
          if 'rib-menu.js' not in html:
              html = html.replace('</body>', js + '</body>', 1)
          path.write_text(html, encoding='utf-8')
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
