name: Deploy playable build to GitHub Pages

# The playable root index already contains the redesigned menu. Pages now
# publishes that exact file instead of creating a different runtime variant.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-main
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Assemble exact playable site
        env:
          RIB_BUILD_VERSION: ${{ github.sha }}
        run: node scripts/assemble-pages.mjs _site

      - name: Verify directly baked redesigned menu
        run: |
          test -f _site/.nojekyll
          test -f _site/rib-build.json
          grep -q 'RIB_DIRECT_MENU_HEAD_BEGIN' _site/index.html
          grep -q './public/rib-menu-assets.css?v=' _site/index.html
          grep -q './public/rib-menu-navigation.js?v=' _site/index.html
          test -f _site/public/rib-menu-assets.css
          test -f _site/public/rib-menu-navigation.js
          test -f _site/a_clean_high_resolution_game_ui_asset_sheet_on_a_1_batch_1.png
          test -f _site/a_clean_ui_graphic_assets_sprite_sheet_mockup_im_2_batch_2.png
          test -f _site/a_clean_graphic_artwork_ui_icon_sheet_on_a_trans_3_batch_3.png

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
